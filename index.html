<style>
  :root{
    --ink:#1b1420;
    --orange:#b85f2f;
    --bg:#f3f4f6;
    --paper:#ffffff;
    --text:#221c1f;
    --line: rgba(34,28,31,0.12);
    --display: 'Archivo', sans-serif;
    --body: 'Work Sans', sans-serif;
    --mono: 'IBM Plex Mono', monospace;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh; background:var(--bg); color:var(--text);
    font-family:var(--body); font-weight:600;
    display:flex; align-items:center; justify-content:center; padding:24px;
  }
  .card{
    max-width:480px; width:100%; text-align:center;
    background:var(--paper); border:1px solid var(--line); border-radius:16px;
    padding:48px 36px; box-shadow:0 24px 50px -24px rgba(27,20,32,.18);
  }
  .logo{width:84px; height:84px; margin:0 auto 28px;}
  .eyebrow{
    font-family:var(--mono); font-size:12px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--orange); font-weight:700; margin:0 0 14px;
  }
  h1{
    font-family:var(--display); font-weight:800; font-size:28px; color:var(--ink);
    margin:0 0 16px; line-height:1.2;
  }
  p{font-size:15px; color:#3a3438; margin:0 0 28px; line-height:1.6;}
  .contact{
    font-family:var(--mono); font-size:13px; color:var(--ink);
    border-top:1px solid var(--line); padding-top:24px; line-height:1.8;
  }
  .contact a{color:var(--orange); text-decoration:none; font-weight:600;}
  .contact a:hover{text-decoration:underline;}
</style>
</head>
